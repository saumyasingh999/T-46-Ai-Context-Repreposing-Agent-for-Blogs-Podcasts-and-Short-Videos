{% extends "base.html" %}
{% block title %}Sign In — ContentAI{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Sign In</h1>
  <p>{% if request.args.get('next') %}Sign in to access this feature.{% else %}Welcome back to ContentAI.{% endif %}</p>
</div>

<div class="card" style="max-width:460px;margin:0 auto;">
  <form method="POST" action="{{ url_for('login', next=request.args.get('next')) }}">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" autofocus />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Enter your password" />
    </div>
    <button type="submit" class="btn btn-primary btn-full">
      <span class="btn-text">Sign In</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);text-align:center;">
    <p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:.75rem;">Don't have an account?</p>
    <a href="{{ url_for('register') }}" class="btn btn-secondary btn-full">Create a Free Account</a>
  </div>
</div>
{% endblock %}
