{% extends "base.html" %}
{% block title %}Sign Up — ContentAI{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Create Account</h1>
  <p>Join ContentAI to start repurposing your content.</p>
</div>

<div class="card" style="max-width:460px;margin:0 auto;">
  <form method="POST" action="{{ url_for('register') }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required placeholder="Choose a username" minlength="3" maxlength="30" autofocus />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="At least 6 characters" minlength="6" />
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-enter your password" minlength="6" />
    </div>
    <button type="submit" class="btn btn-primary btn-full">
      <span class="btn-text">Create Account</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);text-align:center;">
    <p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:.75rem;">Already have an account?</p>
    <a href="{{ url_for('login') }}" class="btn btn-secondary btn-full">Sign In</a>
  </div>
</div>
{% endblock %}
